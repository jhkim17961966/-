<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.A 인수분해 활동</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: white;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 35px;
            box-sizing: border-box;
            position: relative;
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; display: none; }
        .home-btn-small { background-color: #e5e5e5; color: #4b4b4b; border: none; border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .home-btn-small:hover { background-color: #cecece; }
        .score-display { font-size: 16px; font-weight: bold; color: #ff9600; }
        .timer-display { font-size: 16px; font-weight: bold; color: #ff4b4b; min-width: 45px; text-align: right; }

        #cover-screen { text-align: center; }
        .main-title { font-size: 28px; font-weight: 800; color: #2b2b2b; margin-bottom: 10px; }
        .sub-title { font-size: 15px; color: #777; margin-bottom: 35px; line-height: 1.5; }
        .level-group { display: flex; flex-direction: column; gap: 14px; }
        .level-btn { padding: 18px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; transition: all 0.2s; color: white; }
        .btn-easy { background-color: #58cc02; } .btn-easy:hover { background-color: #46a302; }
        .btn-medium { background-color: #ff9600; } .btn-medium:hover { background-color: #e08400; }
        .btn-hard { background-color: #ff4b4b; } .btn-hard:hover { background-color: #e03232; }

        #quiz-screen { display: none; }
        .progress-bar-bg { background-color: #e5e5e5; height: 12px; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar-fill { background-color: #58cc02; height: 100%; width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 24px; font-weight: bold; color: #3c3c3c; margin-bottom: 30px; text-align: center; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: white; border: 2px solid #e5e5e5; border-radius: 15px; padding: 18px; font-size: 18px; color: #4b4b4b; cursor: pointer; transition: all 0.2s; text-align: center; }
        .option-btn:hover:not(:disabled) { background-color: #f7f7f7; }
        .option-btn.correct { background-color: #d7ffb8; border-color: #58cc02; color: #3a8501; font-weight: bold; }
        .option-btn.wrong { background-color: #ffdfe0; border-color: #ea2b2b; color: #c91a1a; }
        
        .feedback-area { margin-top: 20px; min-height: 90px; text-align: center; }
        .feedback-text { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .next-btn { background-color: #1cb0f6; color: white; border: none; border-radius: 15px; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; display: none; box-shadow: 0 4px 0 #1899d6; }
        .next-btn:hover { background-color: #1899d6; }

        #result-screen { display: none; text-align: center; }
        .final-score-text { font-size: 54px; font-weight: 900; color: #1cb0f6; margin: 20px 0; }
        .home-btn-large { background-color: #58cc02; color: white; border: none; border-radius: 15px; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 25px; }
        .level-badge { display: inline-block; padding: 6px 14px; font-size: 16px; font-weight: bold; color: white; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="top-bar" id="top-bar">
        <button class="home-btn-small" onclick="goHome()">처음으로</button>
        <div class="score-display">🏆 <span id="current-score">0</span>점</div>
        <div class="timer-display">⏱️ <span id="timer-text">0.0</span>s</div>
    </div>

    <div id="cover-screen">
        <div class="main-title">🧪 Q.A 인수분해 활동</div>
        <div class="sub-title">시도할 때마다 겹치지 않는 새로운 문제!<br>최고 점수에 도전해보세요.</div>
        <div class="level-group">
            <button class="level-btn btn-easy" onclick="startQuiz('easy')">쉬움</button>
            <button class="level-btn btn-medium" onclick="startQuiz('medium')">중간</button>
            <button class="level-btn btn-hard" onclick="startQuiz('hard')">어려움</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress"></div></div>
        <div class="question-text" id="question">Loading...</div>
        <div class="options-grid" id="options"></div>
        <div class="feedback-area">
            <div class="feedback-text" id="feedback"></div>
            <button class="next-btn" id="next-btn" onclick="nextQuestion()">계속하기</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>🎉 훈련 종료!</h2>
        <div id="result-level-badge" class="level-badge"></div>
        <p>최종 획득 점수입니다.</p>
        <div class="final-score-text" id="final-score">0</div>
        <p id="result-message" style="font-size: 16px; color:#555; line-height:1.4;"></p>
        <button class="home-btn-large" onclick="goHome()">처음 화면으로</button>
    </div>
</div>

<script>
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    // 최대공약수(GCD) 계산 함수
    function getGCD(a, b) { return b === 0 ? a : getGCD(b, a % b); }

    function generateOptions(ans, w1, w2, w3) {
        let opts = [ans, w1, w2, w3];
        for (let i = opts.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [opts[i], opts[j]] = [opts[j], opts[i]];
        }
        return { options: opts, answer: opts.indexOf(ans) };
    }

    function makeEasy() {
        const type = randInt(1, 3);
        let q, ans, w1, w2, w3;
        
        if (type === 1) { 
            let m = randInt(2, 9);
            let sign = randInt(0, 1) === 0 ? '+' : '-';
            let opp = sign === '+' ? '-' : '+';
            q = `${m}x ${sign} ${m}y`; 
            ans = `${m}(x${sign}y)`; 
            w1 = `x(${m}${sign}y)`; 
            w2 = `${m}(x${opp}y)`; 
            w3 = `${m}xy`;
        } else if (type === 2) { 
            let a = randInt(2, 9);
            let sign = randInt(0, 1) === 0 ? '+' : '-';
            q = `x² ${sign} ${a}x`; 
            ans = `x(x${sign}${a})`; 
            w1 = `x(x²${sign}${a})`; 
            w2 = `${a}x(x${sign}1)`; 
            w3 = `x²(1${sign}${a})`;
        } else { 
            let c = randInt(2, 5); 
            let d = randInt(2, 5); 
            let e = randInt(1, 5); 
            
            if (d % 2 === 0 && e % 2 === 0) e += 1;
            if (d === 3 && e === 3) e = 4;
            
            let sign = randInt(0, 1) === 0 ? '+' : '-';
            let a = c * d;
            let b = c * e;
            
            q = `${a}x² ${sign} ${b}x`; 
            ans = `${c}x(${d}x${sign}${e})`; 
            w1 = `${c}(${d}x²${sign}${e}x)`; 
            w2 = `x(${a}x${sign}${b})`;      
            w3 = `${a}x(x${sign}${e})`;      
        }
        let { options, answer } = generateOptions(ans, w1, w2, w3);
        return { q, options, answer };
    }

    function makeMedium() {
        const type = randInt(1, 3);
        let m = randInt(1, 4); // x의 계수
        let n = randInt(1, 7); // 상수항
        if (m === 1 && n === 1) n = randInt(2, 7); 

        // 공통인수 추출 처리
        let g = getGCD(m, n);
        let mp = m / g;
        let np = n / g;
        let g2 = g * g;

        let mStr = m === 1 ? 'x' : m + 'x';
        let m2Str = (m * m) === 1 ? 'x²' : (m * m) + 'x²';
        let mpStr = mp === 1 ? 'x' : mp + 'x';
        
        let pref = g2 === 1 ? "" : g2;
        let prefG = g === 1 ? "" : g;

        let q, ans, w1, w2, w3;
        
        if (type === 1) { 
            // 유형 1: 합차공식 (m²x² - n²)
            q = `${m2Str} - ${n*n}`; 
            if (g === 1) {
                ans = `(${mStr}+${n})(${mStr}-${n})`; 
                w1 = `(${mStr}-${n})²`; 
                w2 = `(${mStr}+${n})²`; 
                w3 = `(${m2Str}+${n*n})(${mStr}-1)`;
            } else {
                ans = `${pref}(${mpStr}+${np})(${mpStr}-${np})`;
                w1 = `(${mStr}+${n})(${mStr}-${n})`; // 덜 묶인 상태 유도
                w2 = `${prefG}(${mpStr}+${np})(${mpStr}-${np})`; // g² 대신 g로 잘못 묶음
                w3 = `${pref}(${mpStr}-${np})²`; 
            }
        } else if (type === 2) { 
            // 유형 2: 완전제곱식 플러스 (m²x² + 2mnx + n²)
            q = `${m2Str} + ${2*m*n}x + ${n*n}`; 
            if (g === 1) {
                ans = `(${mStr}+${n})²`; 
                w1 = `(${mStr}-${n})²`; 
                w2 = `(${mStr}+${n})(${mStr}-${n})`; 
                w3 = `(${m2Str}+${n})²`; 
            } else {
                ans = `${pref}(${mpStr}+${np})²`;
                w1 = `(${mStr}+${n})²`; // 덜 묶인 상태 유도
                w2 = `${prefG}(${mpStr}+${np})²`; // g² 대신 g로 잘못 묶음
                w3 = `${pref}(${mpStr}-${np})²`; 
            }
        } else { 
            // 유형 3: 완전제곱식 마이너스 (m²x² - 2mnx + n²)
            q = `${m2Str} - ${2*m*n}x + ${n*n}`; 
            if (g === 1) {
                ans = `(${mStr}-${n})²`; 
                w1 = `(${mStr}+${n})²`; 
                w2 = `(${mStr}+${n})(${mStr}-${n})`; 
                w3 = `(${m2Str}-${n})²`; 
            } else {
                ans = `${pref}(${mpStr}-${np})²`;
                w1 = `(${mStr}-${n})²`; // 덜 묶인 상태 유도
                w2 = `${prefG}(${mpStr}-${np})²`; // g² 대신 g로 잘못 묶음
                w3 = `${pref}(${mpStr}+${np})²`; 
            }
        }
        
        let { options, answer } = generateOptions(ans, w1, w2, w3);
        return { q, options, answer };
    }

    function makeHard() {
        let a = randInt(-9, 9); let b = randInt(-9, 9);
        while(a === 0 || b === 0 || a === b || a+b === 0) {
            a = randInt(-9, 9); b = randInt(-9, 9);
        }
        let sum = a + b; let prod = a * b;
        let sumStr = sum === 1 ? "+ x" : (sum === -1 ? "- x" : (sum > 0 ? `+ ${sum}x` : `- ${Math.abs(sum)}x`));
        let prodStr = prod > 0 ? `+ ${prod}` : `- ${Math.abs(prod)}`;
        
        let q = `x² ${sumStr} ${prodStr}`;
        let ans = `(x${a>0?'+'+a:a})(x${b>0?'+'+b:b})`;
        let w1 = `(x${a>0?-a:'+'+Math.abs(a)})(x${b>0?-b:'+'+Math.abs(b)})`; 
        let w2 = `(x${sum>0?'+'+sum:sum})(x${prod>0?'+'+prod:prod})`; 
        let w3 = `(x${a>0?'+'+a:a})²`; 
        
        if(ans===w1 || ans===w2 || ans===w3) w3 = `(x+1)(x${prodStr})`;
        
        let { options, answer } = generateOptions(ans, w1, w2, w3);
        return { q, options, answer };
    }

    let currentQuestions = [];
    let currentIdx = 0;
    let totalScore = 0;
    let startTime = 0;
    let timerInterval;
    let currentLevelName = ""; // 현재 진행 중인 난이도 이름을 저장할 변수
    let currentLevelColor = ""; // 현재 진행 중인 난이도의 색상을 저장할 변수

    const BASE_SCORE = 100;
    const MAX_TIME_BONUS = 100;

    function goHome() {
        clearInterval(timerInterval);
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "none";
        document.getElementById("top-bar").style.display = "none";
        document.getElementById("cover-screen").style.display = "block";
    }

    function startQuiz(level) {
        currentQuestions = [];
        let usedQuestions = new Set(); // 출제된 문제를 기억할 Set 생성

        // 난이도 정보 저장
        if (level === 'easy') {
            currentLevelName = "쉬움";
            currentLevelColor = "#58cc02";
        } else if (level === 'medium') {
            currentLevelName = "중간";
            currentLevelColor = "#ff9600";
        } else {
            currentLevelName = "어려움";
            currentLevelColor = "#ff4b4b";
        }

        // 10개의 중복되지 않는 문제가 모일 때까지 반복
        while (currentQuestions.length < 10) {
            let qData;
            if (level === 'easy') qData = makeEasy();
            else if (level === 'medium') qData = makeMedium();
            else qData = makeHard();

            // Set에 없는 새로운 문제일 경우에만 추가
            if (!usedQuestions.has(qData.q)) {
                usedQuestions.add(qData.q);
                currentQuestions.push(qData);
            }
        }

        currentIdx = 0;
        totalScore = 0;
        document.getElementById("current-score").innerText = totalScore;

        document.getElementById("cover-screen").style.display = "none";
        document.getElementById("top-bar").style.display = "flex";
        document.getElementById("quiz-screen").style.display = "block";
        
        loadQuestion();
    }

    function loadQuestion() {
        const qData = currentQuestions[currentIdx];
        document.getElementById("question").innerHTML = qData.q;
        document.getElementById("progress").style.width = `${(currentIdx / 10) * 100}%`;
        
        const optionsDiv = document.getElementById("options");
        optionsDiv.innerHTML = "";
        
        qData.options.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsDiv.appendChild(btn);
        });

        document.getElementById("feedback").innerText = "";
        document.getElementById("next-btn").style.display = "none";

        startTime = Date.now();
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            document.getElementById("timer-text").innerText = elapsed.toFixed(1);
        }, 100);
    }

    function checkAnswer(selectedIndex, btnElement) {
        clearInterval(timerInterval);
        const timeTaken = (Date.now() - startTime) / 1000;

        const qData = currentQuestions[currentIdx];
        const buttons = document.querySelectorAll(".option-btn");
        
        buttons.forEach(btn => btn.disabled = true);
        const feedbackText = document.getElementById("feedback");
        
        if (selectedIndex === qData.answer) {
            btnElement.classList.add("correct");
            
            let timeBonus = Math.max(0, MAX_TIME_BONUS - Math.floor(timeTaken * 10));
            let earnedPoints = BASE_SCORE + timeBonus;
            totalScore += earnedPoints;
            
            document.getElementById("current-score").innerText = totalScore;
            feedbackText.innerHTML = `정답입니다! <span style="color:#ff9600">+${earnedPoints}점</span> (보너스 ${timeBonus}점)`;
            feedbackText.style.color = "#58cc02";
        } else {
            btnElement.classList.add("wrong");
            buttons[qData.answer].classList.add("correct");
            feedbackText.innerText = "아쉽네요. 점수 획득 실패 💡";
            feedbackText.style.color = "#ea2b2b";
        }

        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < 10) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
        document.getElementById("final-score").innerText = totalScore;
        
        // 결과 화면에 난이도 배지 출력 적용
        const badge = document.getElementById("result-level-badge");
        badge.innerText = `${currentLevelName} 난이도`;
        badge.style.backgroundColor = currentLevelColor;

        const msg = document.getElementById("result-message");
        if (totalScore >= 1800) msg.innerHTML = "A급의 완벽한 스피드와 정확도입니다! 최상위권 실력! 🚀";
        else if (totalScore >= 1000) msg.innerHTML = "훌륭합니다! 조금만 더 빠르게 풀면 완벽하겠어요.";
        else msg.innerHTML = "정확도를 높이는 연습을 먼저 해보고 다시 도전해보세요!";
    }
</script>

</body>
</html>
