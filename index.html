<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q.A 인수분해 활동</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: white;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            padding: 35px;
            box-sizing: border-box;
            position: relative;
        }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; display: none; }
        .home-btn-small { background-color: #e5e5e5; color: #4b4b4b; border: none; border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .home-btn-small:hover { background-color: #cecece; }
        .score-display { font-size: 16px; font-weight: bold; color: #ff9600; }
        .timer-display { font-size: 16px; font-weight: bold; color: #ff4b4b; min-width: 45px; text-align: right; }

        #cover-screen { text-align: center; }
        .main-title { font-size: 28px; font-weight: 800; color: #2b2b2b; margin-bottom: 10px; }
        .sub-title { font-size: 15px; color: #777; margin-bottom: 35px; line-height: 1.5; }
        .level-group { display: flex; flex-direction: column; gap: 14px; }
        .level-btn { padding: 18px; font-size: 18px; font-weight: bold; border: none; border-radius: 16px; cursor: pointer; transition: all 0.2s; color: white; }
        .btn-easy { background-color: #58cc02; } .btn-easy:hover { background-color: #46a302; }
        .btn-medium { background-color: #ff9600; } .btn-medium:hover { background-color: #e08400; }
        .btn-hard { background-color: #ff4b4b; } .btn-hard:hover { background-color: #e03232; }

        #quiz-screen { display: none; }
        .progress-bar-bg { background-color: #e5e5e5; height: 12px; border-radius: 6px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar-fill { background-color: #58cc02; height: 100%; width: 0%; transition: width 0.3s ease; }
        .question-text { font-size: 24px; font-weight: bold; color: #3c3c3c; margin-bottom: 30px; text-align: center; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { background-color: white; border: 2px solid #e5e5e5; border-radius: 15px; padding: 18px; font-size: 18px; color: #4b4b4b; cursor: pointer; transition: all 0.2s; text-align: center; }
        .option-btn:hover:not(:disabled) { background-color: #f7f7f7; }
        .option-btn.correct { background-color: #d7ffb8; border-color: #58cc02; color: #3a8501; font-weight: bold; }
        .option-btn.wrong { background-color: #ffdfe0; border-color: #ea2b2b; color: #c91a1a; }
        
        .feedback-area { margin-top: 20px; min-height: 90px; text-align: center; }
        .feedback-text { font-size: 16px; font-weight: bold; margin-bottom: 12px; }
        .next-btn { background-color: #1cb0f6; color: white; border: none; border-radius: 15px; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; display: none; box-shadow: 0 4px 0 #1899d6; }
        .next-btn:hover { background-color: #1899d6; }

        #result-screen { display: none; text-align: center; }
        .final-score-text { font-size: 54px; font-weight: 900; color: #1cb0f6; margin: 20px 0; }
